name: build & prebuild

on:
  push:
    branches: [master, main]
    tags: ['v*']     # pushing a v* tag builds all platforms, cuts a GitHub Release, and publishes to npm
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-13]
    runs-on: ${{ matrix.os }}
    # macOS is best-effort: the CTP vendor framework can't be validated from the
    # dev host, so don't let it fail the workflow (or redden the badge). Windows
    # and Linux are the tested, prebuilt-and-shipped platforms.
    continue-on-error: ${{ matrix.os == 'macos-13' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:ts
      - run: npm test
      - run: npm run prebuild
      - name: bundle CTP libs alongside the prebuilt addon
        shell: bash
        run: |
          dir=$(ls -d prebuilds/*/ | head -n1)
          case "${{ matrix.os }}" in
            windows-latest) cp tradeapi/windows/*.dll "$dir" || true ;;
            ubuntu-latest)  cp tradeapi/linux/*.so "$dir" ;;
            macos-13)       cp -R tradeapi/macos/*.framework "$dir" ;;
          esac
          ls -la "$dir"
      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}
          path: prebuilds/

  # Auto-release + auto-publish, triggered by pushing a v* tag (e.g. `npm version
  # patch && git push --follow-tags`). Builds on all platforms above, then here:
  # sync the version from the tag, cut a GitHub Release (auto notes + the
  # all-platform prebuilds attached), and publish @hitrading/ctp-node to npm.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          merge-multiple: true
          path: prebuilds/
      - run: npm ci --ignore-scripts
      - run: npm run build:ts
      - name: sync the package version to the tag (v1.2.3 -> 1.2.3)
        # package.json ships a 0.0.0 placeholder; the published version is the tag.
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: bundle the all-platform prebuilds as a release asset
        run: tar -czf "ctp-node-prebuilds-${GITHUB_REF_NAME}.tgz" prebuilds/
      - name: create the GitHub Release (auto notes + prebuilds attached)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ctp-node-prebuilds-*.tgz
      - name: publish @hitrading/ctp-node to npm
        # scoped package -> --access public makes the first publish public.
        # Requires the NPM_TOKEN repo secret (an npm "Automation" token whose
        # account can publish to the @hitrading scope).
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
