name: build & prebuild

on:
  push:
    branches: [master, main]
  pull_request:
  release:
    types: [created]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:ts
      - run: npm test
      - run: npm run prebuild
      - name: bundle CTP libs alongside the prebuilt addon
        shell: bash
        run: |
          dir=$(ls -d prebuilds/*/ | head -n1)
          case "${{ matrix.os }}" in
            windows-latest) cp tradeapi/windows/*.dll "$dir" || true ;;
            ubuntu-latest)  cp tradeapi/linux/*.so "$dir" ;;
            macos-13)       cp -R tradeapi/macos/*.framework "$dir" ;;
          esac
          ls -la "$dir"
      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}
          path: prebuilds/

  publish:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          merge-multiple: true
          path: prebuilds/
      - run: npm ci --ignore-scripts
      - run: npm run build:ts
      - name: sync package version to the release tag
        # package.json ships a 0.0.0 placeholder; the published version comes from
        # the release tag (e.g. v0.5.3 -> 0.5.3). Without this every release would
        # try to publish 0.0.0 and fail after the first.
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
        env:
          TAG: ${{ github.event.release.tag_name }}
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
