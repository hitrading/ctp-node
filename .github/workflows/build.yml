name: build & prebuild

on:
  push:
    branches: [master, main]   # a push to master runs CI, then semantic-release decides + cuts a release
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # The tested, prebuilt-and-shipped platforms; the release job gates on
        # these. windows-2022 (not -latest=Server2025) so node-gyp finds VS 2022.
        os: [windows-2022, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:ts
      - run: npm run coverage   # runs the suite under c8 and FAILS if coverage drops below .c8rc.json thresholds
      - name: C++ unit tests (standalone risk/arm) + coverage report
        if: matrix.os == 'ubuntu-latest'   # Linux leg: g++/gcov; the C++ logic is platform-agnostic
        run: CXX=g++ COVERAGE=1 npm run test:cpp   # gates the C++ tests passing; coverage is reported (best-effort)
      - run: npm run prebuild
      - name: bundle CTP libs alongside the prebuilt addon
        shell: bash
        run: |
          dir=$(ls -d prebuilds/*/ | head -n1)
          case "${{ matrix.os }}" in
            windows-2022)  cp ctpsdk/windows/*.dll "$dir" || true ;;
            ubuntu-latest) cp ctpsdk/linux/*.so "$dir" ;;
          esac
          ls -la "$dir"
      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}
          path: prebuilds/

  # macOS is best-effort and DECOUPLED from the release gate: it builds a prebuild
  # when a macOS runner is free, but the release never waits on it. The CTP vendor
  # framework can't be validated from the dev host, and macOS runners queue
  # unpredictably — so it must never block (or delay) shipping Windows/Linux.
  build-macos:
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:ts
      - run: npm test
      - run: npm run prebuild
      - name: bundle CTP libs alongside the prebuilt addon
        shell: bash
        run: |
          dir=$(ls -d prebuilds/*/ | head -n1)
          cp -R ctpsdk/macos/*.framework "$dir"
          ls -la "$dir"
      - uses: actions/upload-artifact@v4
        with:
          name: prebuilds-macos-13
          path: prebuilds/

  # Fully automatic release: on every push to master, semantic-release reads the
  # Conventional Commits since the last release, decides the next version (feat ->
  # minor, fix -> patch, BREAKING CHANGE -> major), updates CHANGELOG.md + the
  # package version, cuts a GitHub Release (auto notes + the available prebuilds
  # attached), and publishes @hitrading/ctp-node to npm. If no release-worthy
  # commits exist, it does nothing. Requires the NPM_TOKEN secret.
  release:
    needs: build              # Windows + Linux only; macOS (build-macos) never gates the release
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semrel.outputs.new_release_published }}   # 'true' when a version was released
      tag: ${{ steps.semrel.outputs.new_release_git_tag }}           # e.g. v1.1.0
    permissions:
      contents: write        # commit the changelog/version bump + create the Release + tag
      issues: write          # semantic-release comments on released issues/PRs
      pull-requests: write
      id-token: write         # npm provenance
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}   # surfaced so the step below can skip when it's unset
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # semantic-release needs full history + tags
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # NOTE: deliberately NO registry-url here. setup-node's registry-url
          # writes an .npmrc with _authToken=${NODE_AUTH_TOKEN}, which collides
          # with @semantic-release/npm's own NPM_TOKEN auth and yields a 401
          # ("EINVALIDNPMTOKEN"). semantic-release configures the registry itself.
      - uses: actions/download-artifact@v4
        with:
          pattern: prebuilds-*
          merge-multiple: true
          path: prebuilds/
      - run: npm ci --ignore-scripts
      - run: npm run build:ts
      - name: bundle the available prebuilds as a release asset
        run: tar -czf ctp-node-prebuilds.tgz prebuilds/
      - name: semantic-release (version + changelog + GitHub Release + npm publish)
        id: semrel
        if: ${{ env.NPM_TOKEN != '' }}   # no-op until you add the NPM_TOKEN secret (keeps the badge green)
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Attach the macOS prebuild to the release ONCE build-macos finishes. macOS
  # runners queue unpredictably, so this runs after BOTH the release and the macOS
  # build — it never delays the npm publish or the release itself. It only acts
  # when a release was actually published, and no-ops gracefully if the macOS build
  # failed/timed out (no artifact). The npm tarball ships Windows/Linux prebuilds;
  # macOS installed from npm builds from source — this enriches the GitHub Release
  # asset for anyone grabbing the prebuild bundle directly.
  attach-macos:
    needs: [build-macos, release]
    if: ${{ always() && needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # upload the asset to the release
      actions: read     # download the build-macos artifact
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true   # build-macos may have failed/timed out -> no artifact
        with:
          name: prebuilds-macos-13
          path: prebuilds/
      - name: package + attach the macOS prebuild to ${{ needs.release.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d prebuilds ] && [ -n "$(ls -A prebuilds 2>/dev/null)" ]; then
            tar -czf ctp-node-macos-prebuild.tgz prebuilds/
            gh release upload "${{ needs.release.outputs.tag }}" ctp-node-macos-prebuild.tgz --clobber --repo "$GITHUB_REPOSITORY"
            echo "attached ctp-node-macos-prebuild.tgz to ${{ needs.release.outputs.tag }}"
          else
            echo "no macOS prebuild artifact (build-macos failed or timed out); nothing to attach"
          fi
